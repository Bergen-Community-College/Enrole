server {
    listen 80;
    listen [::]:80;
    server_name 104.237.145.33;

    root /var/www/Enrole;
    index index.html;

    # CORS — allows ce.bergen.edu to load scripts from this server
    add_header Access-Control-Allow-Origin "https://ce.bergen.edu" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store";
    }

    location ~* \.(css|js|png|jpg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
